<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>⚒️ 무기 강화 클리커</title>
<style>
  /* ============================================================
     [폰트] 레트로 아케이드 느낌의 픽셀 한글 폰트 (로드 실패 시 시스템 폰트로 대체)
     ============================================================ */
  @font-face {
    font-family: 'DungGeunMo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/DungGeunMo.woff') format('woff');
    font-weight: normal;
    font-display: swap;
  }

  /* ============================================================
     [디자인 토큰] 게임 전체에서 사용하는 색상/스타일 변수 정의
     - 대장간(forge) 컨셉: 어두운 강철 배경 + 달궈진 금속의 주황/금색
     ============================================================ */
  :root {
    --bg: #12141a;          /* 전체 배경: 깊은 강철색 */
    --panel: #1d212b;       /* 패널 배경 */
    --panel-edge: #2c3140;  /* 패널 테두리 */
    --text: #e8e6df;        /* 기본 텍스트 */
    --dim: #8b90a0;         /* 보조 텍스트 */
    --gold: #f0b429;        /* 골드/강조색 (달궈진 금속) */
    --molten: #ff7a3d;      /* 용융 주황 (타격 이펙트) */
    --safe: #4cc38a;        /* 안전 구간(초록) */
    --danger: #e5484d;      /* 파괴 위험(빨강) */
    --hp: #ff5c47;          /* 건물 HP 바 색 */
    --shield: #5ba8ff;      /* 보호권(파랑) */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,122,61,0.10), transparent),
      var(--bg);
    color: var(--text);
    font-family: 'DungGeunMo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
  }

  /* 게임 전체 컨테이너 */
  .game {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ============================================================
     [상단 정보 바] 골드 / 무기 이름 / 공격력
     ============================================================ */
  .top-bar {
    display: grid;
    grid-template-columns: 1fr 1.4fr 1fr;
    gap: 8px;
  }
  .stat {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat .label { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
  .stat .value { font-size: 18px; margin-top: 4px; }
  #goldDisplay { color: var(--gold); }
  #atkDisplay  { color: var(--molten); }
  #weaponName  { color: var(--text); }

  /* ============================================================
     [중앙 영역] 스테이지 정보 + 건물 + HP 바
     ============================================================ */
  .arena {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    position: relative;
    overflow: hidden; /* 플로팅 데미지 텍스트가 밖으로 나가지 않게 */
  }

  /* 스테이지 이동 버튼 줄 */
  .stage-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .stage-row button {
    background: #262b38;
    border: 1px solid var(--panel-edge);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .stage-row button:hover:not(:disabled) { background: #323950; }
  .stage-row button:disabled { opacity: 0.35; cursor: not-allowed; }
  .stage-title { font-size: 16px; color: var(--gold); }

  /* 클릭 대상 건물 (이모지) */
  .building {
    font-size: 96px;
    line-height: 1.1;
    cursor: pointer;
    display: inline-block;
    user-select: none;             /* 연타 시 텍스트 선택 방지 */
    -webkit-user-select: none;
    transition: transform 0.05s;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5));
  }
  .building:active { transform: scale(0.92); } /* 클릭 시 눌리는 느낌 */

  /* 건물 피격 시 흔들림 애니메이션 */
  .building.hit { animation: shake 0.12s; }
  @keyframes shake {
    0%   { transform: translateX(0) scale(0.95); }
    30%  { transform: translateX(-6px); }
    60%  { transform: translateX(5px); }
    100% { transform: translateX(0); }
  }

  /* HP 바 (게이지) */
  .hp-wrap {
    margin-top: 14px;
    background: #0d0f14;
    border: 1px solid var(--panel-edge);
    border-radius: 999px;
    height: 26px;
    position: relative;
    overflow: hidden;
  }
  .hp-fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff8a5c, var(--hp));
    border-radius: 999px;
    transition: width 0.12s ease-out;
  }
  .hp-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
  .reward-hint { margin-top: 8px; font-size: 12px; color: var(--dim); }
  .reward-hint b { color: var(--gold); }
  .dps-hint { margin-top: 4px; font-size: 12px; color: var(--dim); }
  .dps-hint b { color: var(--molten); }

  /* 클릭 시 떠오르는 데미지 숫자 (플로팅 텍스트) */
  .floating-dmg {
    position: absolute;
    pointer-events: none;   /* 클릭 방해 금지 */
    font-size: 22px;
    color: var(--molten);
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    animation: floatUp 0.7s ease-out forwards;
    z-index: 5;
  }
  /* 건물 파괴 시 뜨는 골드 획득 텍스트 */
  .floating-gold {
    position: absolute;
    pointer-events: none;
    font-size: 26px;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    animation: floatUp 1s ease-out forwards;
    z-index: 6;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(1.25); }
  }

  /* ============================================================
     [하단 영역] 강화 패널 + 시스템 로그
     ============================================================ */
  .forge {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    padding: 16px;
  }
  .forge-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--dim);
  }
  .forge-head .prob-safe   { color: var(--safe); }
  .forge-head .prob-mid    { color: var(--gold); }
  .forge-head .prob-danger { color: var(--danger); }

  /* 강화 버튼 기본 스타일 (안전 구간) */
  #enhanceBtn {
    width: 100%;
    font-family: inherit;
    font-size: 17px;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #3a6b52;
    background: linear-gradient(180deg, #2e5d45, #234736);
    color: #d9ffe9;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.2s;
  }
  #enhanceBtn:hover:not(:disabled) { transform: translateY(-1px); }
  #enhanceBtn:active:not(:disabled) { transform: translateY(1px); }
  #enhanceBtn:disabled { opacity: 0.45; cursor: not-allowed; }
  #enhanceBtn .sub { display: block; font-size: 12px; margin-top: 5px; opacity: 0.85; }

  /* 10강 이상: 파괴 위험 경고 스타일 (붉은색 + 맥동 발광) */
  #enhanceBtn.danger {
    border-color: #a13036;
    background: linear-gradient(180deg, #8f2a30, #5f1b20);
    color: #ffe3e3;
    animation: pulseDanger 1.1s infinite;
  }
  @keyframes pulseDanger {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,72,77,0.55); }
    50%      { box-shadow: 0 0 22px 4px rgba(229,72,77,0.55); }
  }

  /* 보호권 사용 토글 줄 (파괴 구간에서만 표시) */
  .protect-row {
    display: none;             /* 기본은 숨김, JS에서 파괴 구간일 때 표시 */
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(91,168,255,0.08);
    border: 1px solid rgba(91,168,255,0.35);
    border-radius: 10px;
    font-size: 13px;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .protect-row.show { display: flex; }
  .protect-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--shield); }
  .protect-row input { width: 16px; height: 16px; accent-color: var(--shield); cursor: pointer; }
  .protect-row .count { color: var(--dim); }

  /* 무기 파괴 시 화면 전체 흔들림 + 붉은 섬광 */
  .game.destroyed { animation: bigShake 0.5s; }
  @keyframes bigShake {
    0%   { transform: translate(0,0); }
    20%  { transform: translate(-10px, 4px); }
    40%  { transform: translate(8px, -6px); }
    60%  { transform: translate(-6px, 5px); }
    80%  { transform: translate(5px, -3px); }
    100% { transform: translate(0,0); }
  }
  .flash {
    position: fixed;
    inset: 0;
    background: rgba(229,72,77,0.35);
    pointer-events: none;
    animation: flashOut 0.5s forwards;
    z-index: 99;
  }
  @keyframes flashOut { to { opacity: 0; } }

  /* 시스템 로그 창 */
  .log {
    margin-top: 12px;
    background: #0d0f14;
    border: 1px solid var(--panel-edge);
    border-radius: 10px;
    padding: 10px 12px;
    min-height: 118px;
    font-size: 13px;
    line-height: 1.8;
  }
  .log .entry-success { color: var(--safe); }
  .log .entry-fail    { color: var(--gold); }
  .log .entry-destroy { color: var(--danger); }
  .log .entry-info    { color: var(--dim); }
  .log .entry-shield  { color: var(--shield); }

  /* ============================================================
     [상점 패널] 자동 클릭 동료 + 강화 보호권
     ============================================================ */
  .shop {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    padding: 16px;
  }
  .shop-head {
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .shop-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    background: #171a22;
    border: 1px solid var(--panel-edge);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .shop-item:last-child { margin-bottom: 0; }
  .shop-item .info { text-align: left; flex: 1; }
  .shop-item .name { font-size: 14px; }
  .shop-item .desc { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .shop-item .owned { font-size: 13px; color: var(--gold); min-width: 52px; text-align: center; }
  .shop-item button {
    font-family: inherit;
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid #6b5a2a;
    background: linear-gradient(180deg, #4a3d18, #38300f);
    color: #ffe9b0;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.08s;
  }
  .shop-item button:hover:not(:disabled) { transform: translateY(-1px); }
  .shop-item button:disabled { opacity: 0.4; cursor: not-allowed; }
  .shop-item.shield-item button {
    border-color: #2d5c8f;
    background: linear-gradient(180deg, #1f4468, #17324d);
    color: #cfe6ff;
  }

  /* 저장/초기화 유틸 버튼 줄 */
  .save-row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .save-row button {
    font-family: inherit;
    font-size: 12px;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--panel-edge);
    background: #1d212b;
    color: var(--dim);
    cursor: pointer;
  }
  .save-row button:hover { color: var(--text); background: #262b38; }
  .save-note { text-align: center; font-size: 11px; color: var(--dim); }

  /* 모션 최소화 설정을 켠 사용자를 위한 배려 */
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="game" id="gameRoot">

  <!-- ===== 상단 정보 바: 골드 / 무기 / 공격력 ===== -->
  <div class="top-bar">
    <div class="stat">
      <div class="label">💰 골드</div>
      <div class="value" id="goldDisplay">0</div>
    </div>
    <div class="stat">
      <div class="label">⚔️ 무기</div>
      <div class="value" id="weaponName">+0 낡은 검</div>
    </div>
    <div class="stat">
      <div class="label">🔥 공격력</div>
      <div class="value" id="atkDisplay">10</div>
    </div>
  </div>

  <!-- ===== 중앙 영역: 스테이지 이동 + 건물 + HP 바 ===== -->
  <div class="arena" id="arena">
    <div class="stage-row">
      <button id="prevStageBtn">◀ 이전 레벨</button>
      <div class="stage-title" id="stageTitle">건물 Lv.1</div>
      <button id="nextStageBtn">다음 레벨 ▶</button>
    </div>

    <!-- 클릭 대상 건물 -->
    <div class="building" id="building">🏢</div>

    <!-- 건물 HP 게이지 -->
    <div class="hp-wrap">
      <div class="hp-fill" id="hpFill"></div>
      <div class="hp-text" id="hpText">100 / 100</div>
    </div>
    <div class="reward-hint" id="rewardHint">파괴 보상: <b>50 골드</b></div>
    <div class="dps-hint" id="dpsHint">🤖 동료 자동 공격: <b>0 /초</b></div>
  </div>

  <!-- ===== 강화 패널: 현서의 강화기 + 시스템 로그 ===== -->
  <div class="forge">
    <div class="forge-head">
      <span>⚒️ 현서의 강화기</span>
      <span id="probLabel" class="prob-safe">성공 확률 100%</span>
    </div>

    <!-- 강화 버튼: 확률과 비용을 버튼에 함께 표기 -->
    <button id="enhanceBtn">
      강화 시도 (100%)
      <span class="sub" id="costLabel">필요 골드: 100</span>
    </button>

    <!-- 파괴 구간(10강~)에서만 나타나는 보호권 사용 토글 -->
    <div class="protect-row" id="protectRow">
      <label>
        <input type="checkbox" id="useProtectChk" />
        🛡️ 강화 보호권 사용 (파괴 대신 -1 하락)
      </label>
      <span class="count">보유: <span id="protectCountInline">0</span>장</span>
    </div>

    <!-- 최근 5개의 시스템 메시지 로그 -->
    <div class="log" id="logBox">
      <div class="entry-info">⚒️ 건물을 클릭해 골드를 모으고, 무기를 강화하세요!</div>
    </div>
  </div>

  <!-- ===== 상점 패널: 자동 클릭 동료 + 보호권 ===== -->
  <div class="shop">
    <div class="shop-head">
      <span>🏪 대장간 상점</span>
      <span>동료는 1초마다 자동으로 건물을 공격합니다</span>
    </div>
    <!-- 동료 목록은 JS가 데이터 기반으로 생성 -->
    <div id="companionList"></div>

    <!-- 강화 보호권 구매 (파괴 방지 아이템) -->
    <div class="shop-item shield-item">
      <div class="info">
        <div class="name">🛡️ 강화 보호권</div>
        <div class="desc">10강 이상 강화 실패 시 파괴를 막고 -1 하락으로 완화</div>
      </div>
      <div class="owned"><span id="protectCount">0</span>장</div>
      <button id="buyProtectBtn">구매<br><span id="protectCost">25,000 G</span></button>
    </div>
  </div>

  <!-- ===== 저장 / 초기화 ===== -->
  <div class="save-row">
    <button id="saveBtn">💾 저장</button>
    <button id="resetBtn">🗑️ 데이터 초기화</button>
  </div>
  <div class="save-note" id="saveNote">5초마다 자동 저장됩니다.</div>
</div>

<script>
/* ================================================================
   무기 강화 클리커 게임 - 메인 스크립트
   ---------------------------------------------------------------
   구조:
   1) 게임 상태(state)와 밸런스 수치 계산 함수
   2) 강화 시스템 - 현서의 강화기 (구간별 확률 / 하락 / 파괴 / 보호권)
   3) 전투 시스템 (클릭 타격 / 자동 공격 동료 / 파괴 보상 / 리스폰)
   4) 상점 시스템 (동료 고용, 보호권 구매)
   5) 저장 시스템 (localStorage 자동 저장, 미지원 환경에선 자동 비활성화)
   6) UI 렌더링 및 이펙트 (플로팅 텍스트, 로그, 경고 버튼)
   ================================================================ */

/* ---------- 동료(자동 클릭) 데이터 정의 ---------- */
// dps: 1초당 자동 피해량 / baseCost: 첫 구매 가격 (구매할수록 1.25배씩 상승)
const COMPANIONS = [
  { id: 'apprentice', icon: '🔨', name: '견습 대장장이', dps: 5,      baseCost: 500 },
  { id: 'mercenary',  icon: '🗡️', name: '용병',          dps: 60,     baseCost: 6000 },
  { id: 'wizard',     icon: '🧙', name: '마법사',        dps: 800,    baseCost: 70000 },
  { id: 'dragon',     icon: '🐉', name: '드래곤',        dps: 12000,  baseCost: 900000 },
];

/* ---------- 1. 게임 상태 ---------- */
const state = {
  gold: 0,          // 보유 골드
  enhance: 0,       // 현재 무기 강화 수치 (0강부터 시작)
  stage: 1,         // 현재 건물 레벨(스테이지)
  maxStage: 1,      // 지금까지 도달한 최고 스테이지 (다음 레벨 버튼 제한용)
  hp: 0,            // 현재 건물 HP (init에서 설정)
  companions: {},   // 동료 보유 수량 { id: count }
  protect: 0,       // 강화 보호권 보유 수
  useProtect: false // 보호권 사용 토글 상태
};

/* ---------- 밸런스 계산 함수들 ---------- */

// 무기 공격력: 기본 10, 강화 1단계마다 약 1.55배씩 기하급수적으로 증가
function getAttack(level) {
  return Math.round(10 * Math.pow(1.55, level));
}

// 강화 비용: 기본 100골드, 단계마다 약 1.9배씩 크게 증가
function getEnhanceCost(level) {
  return Math.round(100 * Math.pow(1.9, level));
}

// 건물 최대 HP: 레벨마다 2.8배씩 기하급수적으로 증가
function getBuildingMaxHp(stage) {
  return Math.round(100 * Math.pow(2.8, stage - 1));
}

// 건물 파괴 보상 골드: 레벨마다 2.4배씩 증가
function getBuildingReward(stage) {
  return Math.round(50 * Math.pow(2.4, stage - 1));
}

// 동료 구매 비용: 살수록 1.25배씩 비싸짐 (클리커 장르 표준 공식)
function getCompanionCost(comp) {
  const owned = state.companions[comp.id] || 0;
  return Math.round(comp.baseCost * Math.pow(1.25, owned));
}

// 보호권 가격: 현재 강화 수치가 높을수록 비싸짐 (10강 기준 25,000G에서 시작)
function getProtectCost() {
  const over = Math.max(0, state.enhance - 9);
  return Math.round(25000 * Math.pow(1.5, over));
}

// 모든 동료의 초당 피해량(DPS) 합계
function getTotalDps() {
  return COMPANIONS.reduce(
    (sum, c) => sum + c.dps * (state.companions[c.id] || 0), 0
  );
}

// 강화 수치에 따라 무기 이름(등급)이 성장하는 재미 요소
function getWeaponTitle(level) {
  if (level >= 13) return '신화의 검';
  if (level >= 10) return '전설의 검';
  if (level >= 7)  return '명장의 검';
  if (level >= 4)  return '강철 검';
  return '낡은 검';
}

/* ---------- 2. 강화 시스템 (현서의 강화기) ---------- */

/**
 * 현재 강화 수치에 해당하는 규칙을 반환.
 * - rate    : 성공 확률 (0~1)
 * - destroy : 실패 시 무기 파괴 여부
 * - drop    : 실패 시 강화 수치 1 하락 여부
 */
function getEnhanceRule(level) {
  if (level <= 3)  return { rate: 1.00, destroy: false, drop: false }; // 0~3강: 100%
  if (level <= 6)  return { rate: 0.70, destroy: false, drop: true  }; // 4~6강: 70%, 실패 시 -1
  if (level <= 9)  return { rate: 0.50, destroy: false, drop: true  }; // 7~9강: 50%, 실패 시 -1
  if (level <= 12) return { rate: 0.30, destroy: true,  drop: false }; // 10~12강: 30%, 실패 시 파괴!
  return             { rate: 0.15, destroy: true,  drop: false };      // 13강~: 15%, 실패 시 파괴!
}

/** 강화 버튼 클릭 시 실행되는 메인 로직 */
function tryEnhance() {
  const cost = getEnhanceCost(state.enhance);
  if (state.gold < cost) {
    addLog('골드가 부족합니다!', 'entry-info');
    return;
  }

  state.gold -= cost;                        // 비용 차감 (성공/실패와 무관)
  const rule = getEnhanceRule(state.enhance);
  const success = Math.random() < rule.rate; // 확률 판정

  if (success) {
    // ✅ 강화 성공: 수치 +1
    state.enhance++;
    addLog('✨ 강화 성공! → +' + state.enhance + ' ' + getWeaponTitle(state.enhance), 'entry-success');
  } else if (rule.destroy) {
    // 💥 파괴 구간에서 실패!
    if (state.useProtect && state.protect > 0) {
      // 🛡️ 보호권 사용 중: 파괴를 막고 -1 하락으로 완화, 보호권 1장 소모
      state.protect--;
      state.enhance = Math.max(0, state.enhance - 1);
      addLog('🛡️ 보호권이 무기를 지켰습니다! 수치 -1 (+' + state.enhance + '), 보호권 1장 소모', 'entry-shield');
      if (state.protect === 0) state.useProtect = false; // 다 쓰면 토글 자동 해제
    } else {
      // 보호권 없음: 무기 완전 파괴 (0강 초기화)
      addLog('💥 무기가 파괴되었습니다! (+' + state.enhance + ' → +0)', 'entry-destroy');
      state.enhance = 0;
      playDestroyEffect(); // 화면 흔들림 + 붉은 섬광 연출
    }
  } else if (rule.drop) {
    // ⚠️ 강화 실패 + 하락 구간: 수치 -1
    state.enhance = Math.max(0, state.enhance - 1);
    addLog('❌ 강화 실패... 수치가 하락했습니다. (+' + state.enhance + ')', 'entry-fail');
  } else {
    // 안전 구간(0~3강)은 확률 100%라 사실상 도달하지 않지만 방어적으로 처리
    addLog('❌ 강화 실패... (수치 유지)', 'entry-fail');
  }

  saveGame(true); // 강화 결과는 중요하므로 즉시 저장 (조용히)
  render();
}

/* ---------- 3. 전투 시스템 (클리커 + 자동 공격) ---------- */

/** 건물 클릭 시: 공격력만큼 HP 감소 + 데미지 플로팅 텍스트 */
function hitBuilding(event) {
  const dmg = getAttack(state.enhance);
  state.hp -= dmg;

  // 클릭한 위치 근처에 데미지 숫자 표시
  spawnFloatingText('-' + formatNum(dmg), event.clientX, event.clientY, 'floating-dmg');

  // 건물 피격 흔들림 애니메이션 재생 (클래스 재적용 트릭)
  const b = document.getElementById('building');
  b.classList.remove('hit');
  void b.offsetWidth; // 리플로우 강제로 애니메이션 리셋
  b.classList.add('hit');

  // HP가 0 이하가 되면 파괴 처리
  if (state.hp <= 0) {
    destroyBuilding(event.clientX, event.clientY);
  }
  render();
}

/**
 * 동료 자동 공격 루프: 0.1초마다 (총 DPS / 10)만큼 피해.
 * 소수점 피해는 누적(carry)했다가 1 이상이 되면 반영해 정확한 DPS 유지.
 */
let dpsCarry = 0;
function autoAttackTick() {
  const dps = getTotalDps();
  if (dps <= 0) return;

  dpsCarry += dps / 10;
  const dmg = Math.floor(dpsCarry);
  if (dmg <= 0) return;
  dpsCarry -= dmg;

  state.hp -= dmg;

  // 자동 공격으로 파괴되면 건물 중앙 좌표에 보상 텍스트 표시
  if (state.hp <= 0) {
    const rect = document.getElementById('building').getBoundingClientRect();
    destroyBuilding(rect.left + rect.width / 2, rect.top + rect.height / 3);
  }
  render();
}

/** 건물 파괴: 골드 지급 + 이펙트 + 즉시 리스폰 (x, y는 화면 좌표) */
function destroyBuilding(x, y) {
  const reward = getBuildingReward(state.stage);
  state.gold += reward;

  spawnFloatingText('💥 +' + formatNum(reward) + ' G', x, y, 'floating-gold');
  addLog('🏢 Lv.' + state.stage + ' 건물 파괴! ' + formatNum(reward) + ' 골드 획득', 'entry-success');

  // 즉시 동일 레벨 건물 리스폰 (HP 가득 채움)
  state.hp = getBuildingMaxHp(state.stage);
}

/** 스테이지(건물 레벨) 변경. dir = +1(다음) / -1(이전) */
function changeStage(dir) {
  const next = state.stage + dir;
  if (next < 1) return;                       // 1레벨 아래로는 불가
  if (next > state.maxStage + 1) return;      // 순차 진행 (한 번에 한 레벨씩 해금)

  state.stage = next;
  state.maxStage = Math.max(state.maxStage, next);
  state.hp = getBuildingMaxHp(state.stage);   // 새 건물은 HP 가득 찬 상태로 등장
  addLog('🚩 건물 Lv.' + state.stage + ' 도전!', 'entry-info');
  render();
}

/* ---------- 4. 상점 시스템 ---------- */

/** 동료 고용 */
function buyCompanion(comp) {
  const cost = getCompanionCost(comp);
  if (state.gold < cost) {
    addLog('골드가 부족합니다!', 'entry-info');
    return;
  }
  state.gold -= cost;
  state.companions[comp.id] = (state.companions[comp.id] || 0) + 1;
  addLog(comp.icon + ' ' + comp.name + ' 고용! (총 ' + state.companions[comp.id] + '명, DPS +' + formatNum(comp.dps) + ')', 'entry-info');
  saveGame(true);
  render();
}

/** 강화 보호권 구매 */
function buyProtect() {
  const cost = getProtectCost();
  if (state.gold < cost) {
    addLog('골드가 부족합니다!', 'entry-info');
    return;
  }
  state.gold -= cost;
  state.protect++;
  addLog('🛡️ 강화 보호권 구매! (보유 ' + state.protect + '장)', 'entry-shield');
  saveGame(true);
  render();
}

/* ---------- 5. 저장 시스템 (localStorage) ----------
   일부 미리보기/샌드박스 환경에서는 localStorage가 차단될 수 있으므로
   try/catch로 감싸 저장 기능만 조용히 비활성화하고 게임은 정상 동작시킨다. */
const SAVE_KEY = 'weapon-clicker-save-v1';
let storageOk = true;

/** 현재 상태를 저장. silent=true면 로그를 남기지 않음(자동 저장용) */
function saveGame(silent) {
  if (!storageOk) return;
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    if (!silent) addLog('💾 게임이 저장되었습니다.', 'entry-info');
  } catch (e) {
    storageOk = false; // 저장 불가 환경: 이후 시도 중단
    document.getElementById('saveNote').textContent =
      '⚠️ 이 환경에서는 저장이 지원되지 않습니다. (게임은 정상 플레이 가능)';
  }
}

/** 저장된 데이터가 있으면 불러와서 state에 병합 */
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    Object.assign(state, data); // 저장본을 현재 상태 위에 덮어쓰기
    return true;
  } catch (e) {
    storageOk = false;
    document.getElementById('saveNote').textContent =
      '⚠️ 이 환경에서는 저장이 지원되지 않습니다. (게임은 정상 플레이 가능)';
    return false;
  }
}

/** 저장 데이터 삭제 + 게임을 처음 상태로 리셋 */
function resetGame() {
  if (!confirm('정말 모든 진행 상황을 초기화할까요?')) return;
  try { localStorage.removeItem(SAVE_KEY); } catch (e) { /* 무시 */ }

  // 상태를 초기값으로 되돌림
  state.gold = 0;
  state.enhance = 0;
  state.stage = 1;
  state.maxStage = 1;
  state.companions = {};
  state.protect = 0;
  state.useProtect = false;
  state.hp = getBuildingMaxHp(1);

  addLog('🗑️ 데이터가 초기화되었습니다. 새로운 시작!', 'entry-info');
  render();
}

/* ---------- 6. UI 렌더링 & 이펙트 ---------- */

/** 숫자를 읽기 쉽게 콤마 표기 (예: 12,345) */
function formatNum(n) {
  return n.toLocaleString('ko-KR');
}

/** 화면 좌표(x, y) 근처에 떠오르는 플로팅 텍스트 생성 */
function spawnFloatingText(text, clientX, clientY, className) {
  const arena = document.getElementById('arena');
  const rect = arena.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = className;
  el.textContent = text;

  // 화면 좌표를 arena 기준 상대 좌표로 변환 + 약간의 랜덤 오프셋
  const x = clientX - rect.left + (Math.random() * 40 - 20);
  const y = clientY - rect.top - 10;
  el.style.left = x + 'px';
  el.style.top = y + 'px';

  arena.appendChild(el);
  // 애니메이션 종료 후 DOM에서 제거 (메모리 누수 방지)
  setTimeout(() => el.remove(), 1000);
}

/** 무기 파괴 연출: 화면 전체 흔들림 + 붉은 섬광 */
function playDestroyEffect() {
  const root = document.getElementById('gameRoot');
  root.classList.remove('destroyed');
  void root.offsetWidth;
  root.classList.add('destroyed');

  const flash = document.createElement('div');
  flash.className = 'flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);
}

/** 시스템 로그 추가 (최근 5개만 유지, 최신이 맨 위) */
const logs = [];
function addLog(message, cls) {
  logs.unshift({ message, cls });
  if (logs.length > 5) logs.pop();

  const box = document.getElementById('logBox');
  box.innerHTML = logs
    .map(l => '<div class="' + l.cls + '">' + l.message + '</div>')
    .join('');
}

/** 상점의 동료 카드들을 데이터 기반으로 최초 1회 생성 */
function buildCompanionShop() {
  const list = document.getElementById('companionList');
  COMPANIONS.forEach(comp => {
    const row = document.createElement('div');
    row.className = 'shop-item';
    row.innerHTML =
      '<div class="info">' +
        '<div class="name">' + comp.icon + ' ' + comp.name + '</div>' +
        '<div class="desc">초당 ' + formatNum(comp.dps) + ' 피해</div>' +
      '</div>' +
      '<div class="owned"><span id="owned-' + comp.id + '">0</span>명</div>' +
      '<button id="buy-' + comp.id + '">고용<br><span id="cost-' + comp.id + '"></span></button>';
    list.appendChild(row);
    document.getElementById('buy-' + comp.id)
      .addEventListener('click', () => buyCompanion(comp));
  });
}

/** 게임 상태를 화면 전체에 반영하는 렌더 함수 */
function render() {
  // --- 상단 정보 ---
  document.getElementById('goldDisplay').textContent = formatNum(state.gold);
  document.getElementById('weaponName').textContent =
    '+' + state.enhance + ' ' + getWeaponTitle(state.enhance);
  document.getElementById('atkDisplay').textContent =
    formatNum(getAttack(state.enhance));

  // --- 중앙: 건물 & HP 바 & DPS ---
  const maxHp = getBuildingMaxHp(state.stage);
  const ratio = Math.max(0, state.hp / maxHp);
  document.getElementById('stageTitle').textContent = '건물 Lv.' + state.stage;
  document.getElementById('hpFill').style.width = (ratio * 100) + '%';
  document.getElementById('hpText').textContent =
    formatNum(Math.max(0, state.hp)) + ' / ' + formatNum(maxHp);
  document.getElementById('rewardHint').innerHTML =
    '파괴 보상: <b>' + formatNum(getBuildingReward(state.stage)) + ' 골드</b>';
  document.getElementById('dpsHint').innerHTML =
    '🤖 동료 자동 공격: <b>' + formatNum(getTotalDps()) + ' /초</b>';

  // 스테이지 버튼 활성/비활성 처리
  document.getElementById('prevStageBtn').disabled = state.stage <= 1;
  document.getElementById('nextStageBtn').disabled = state.stage >= state.maxStage + 1;

  // --- 강화 버튼 ---
  const rule = getEnhanceRule(state.enhance);
  const cost = getEnhanceCost(state.enhance);
  const percent = Math.round(rule.rate * 100);
  const btn = document.getElementById('enhanceBtn');
  const probLabel = document.getElementById('probLabel');

  // 버튼 본문: 다음 강화 확률 + 파괴 경고 문구
  btn.childNodes[0].textContent = rule.destroy
    ? '⚠️ 강화 시도 (' + percent + '%) — 실패 시 파괴!'
    : '강화 시도 (' + percent + '%)';
  document.getElementById('costLabel').textContent =
    '+' + state.enhance + ' → +' + (state.enhance + 1) + ' | 필요 골드: ' + formatNum(cost);

  // 골드 부족 시 버튼 비활성화
  btn.disabled = state.gold < cost;

  // 10강 이상(파괴 구간)이면 버튼을 붉은 경고 스타일로 전환
  btn.classList.toggle('danger', rule.destroy);

  // 상단 확률 라벨 색상도 구간에 따라 변경
  probLabel.textContent = '성공 확률 ' + percent + '%';
  probLabel.className = rule.destroy
    ? 'prob-danger'
    : (percent === 100 ? 'prob-safe' : 'prob-mid');

  // --- 보호권 토글 줄: 파괴 구간에서만 표시 ---
  const protectRow = document.getElementById('protectRow');
  protectRow.classList.toggle('show', rule.destroy);
  const chk = document.getElementById('useProtectChk');
  chk.checked = state.useProtect;
  chk.disabled = state.protect <= 0; // 보호권이 없으면 체크 불가
  document.getElementById('protectCountInline').textContent = state.protect;

  // --- 상점: 동료 & 보호권 가격/보유량/구매 가능 여부 ---
  COMPANIONS.forEach(comp => {
    const cCost = getCompanionCost(comp);
    document.getElementById('owned-' + comp.id).textContent = state.companions[comp.id] || 0;
    document.getElementById('cost-' + comp.id).textContent = formatNum(cCost) + ' G';
    document.getElementById('buy-' + comp.id).disabled = state.gold < cCost;
  });
  const pCost = getProtectCost();
  document.getElementById('protectCount').textContent = state.protect;
  document.getElementById('protectCost').textContent = formatNum(pCost) + ' G';
  document.getElementById('buyProtectBtn').disabled = state.gold < pCost;
}

/* ---------- 게임 초기화 및 이벤트 바인딩 ---------- */
function init() {
  buildCompanionShop(); // 상점 동료 카드 생성

  // 저장 데이터가 있으면 불러오기, 없으면 첫 건물 HP 설정
  const loaded = loadGame();
  if (loaded) {
    addLog('💾 저장된 게임을 불러왔습니다. 다시 오신 걸 환영합니다!', 'entry-info');
    // 불러온 HP가 비정상(0 이하)이면 새 건물로 교체
    if (!state.hp || state.hp <= 0) state.hp = getBuildingMaxHp(state.stage);
  } else {
    state.hp = getBuildingMaxHp(state.stage);
  }

  // 이벤트 바인딩
  document.getElementById('building').addEventListener('click', hitBuilding);
  document.getElementById('enhanceBtn').addEventListener('click', tryEnhance);
  document.getElementById('prevStageBtn').addEventListener('click', () => changeStage(-1));
  document.getElementById('nextStageBtn').addEventListener('click', () => changeStage(1));
  document.getElementById('buyProtectBtn').addEventListener('click', buyProtect);
  document.getElementById('saveBtn').addEventListener('click', () => saveGame(false));
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('useProtectChk').addEventListener('change', (e) => {
    state.useProtect = e.target.checked;
  });

  // 동료 자동 공격 루프 (0.1초 간격으로 부드럽게)
  setInterval(autoAttackTick, 100);
  // 5초마다 자동 저장
  setInterval(() => saveGame(true), 5000);

  render();
}

init(); // 게임 시작!
</script>
